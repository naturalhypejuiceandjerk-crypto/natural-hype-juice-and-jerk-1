services:
  - type: web
    name: natural-hype-juice-and-jerk
    env: node
    plan: free
    autoDeploy: true
    buildCommand: echo "No build step required"
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESTAURANT_EMAIL
        value: naturalhypejuiceandjerk@gmail.com
      - key: MAIL_FROM
        value: Natural Hype Orders <onboarding@resend.dev>
